<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Nayana Nagaraj Gowda - Candy Crush</title>

    <link rel="icon" type="image/png" href="images/icon.png">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400&display=swap" rel="stylesheet">
    
  </head>
  <body>
    <!-- 🌥️ CLOUD LAYER (ADD THIS AT THE VERY TOP INSIDE BODY) -->
  <div class="cloud-layer">
    <img src="images/cloud1.png" class="cloud c1">
    <img src="images/cloud2.png" class="cloud c2">
    <img src="images/cloud3.png" class="cloud c3">
    <img src="images/cloud4.png" class="cloud c4">
    <img src="images/cloud5.png" class="cloud c5">
    <img src="images/cloud6.png" class="cloud c6">
  </div>

    <!-- Mode Selection Screen -->
    <div id="modeSelection">
      <h2>Choose Game Mode</h2>
      <button id="endlessMode">Endless Mode</button>
      <button id="timedMode">Timed Mode</button>
    </div>
    <!-- Scoreboard with Timer and Change Mode Button(Candy Crush style glass UI) -->
    <div class="scoreBoard">
      <h3>score</h3>
      <h1 id="score">0</h1>
      <div id="timer"></div>
      <button id="changeMode">Change Mode</button>
    </div>
    <!-- Game Grid -->
    <div class="grid"></div>
   
    <!-- 🎵 Background music -->
    <audio id="bg-music" loop>
       <source src="music/bg-music.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js" charset="utf-8"></script>
  </body>
</html>
